// proto/agent/agent.proto
// Agent 分析服务 Protobuf 定义。
// 提供粉丝增长分析、标签分析、运营建议、定时发布。
// 生成 Go 桩代码：make proto

syntax = "proto3";

package agent;

option go_package = "xys-clone/proto/agent;agentpb";

// ──────────── Agent 服务 ────────────
service AgentService {
  rpc GetNoteFansGrowth(GetNoteFansGrowthReq) returns (GetNoteFansGrowthResp);
  rpc GetTagAnalytics(GetTagAnalyticsReq)     returns (GetTagAnalyticsResp);
  rpc GetTopTags(GetTopTagsReq)               returns (GetTopTagsResp);
  rpc GetSuggestions(GetSuggestionsReq)       returns (GetSuggestionsResp);
  rpc CreateScheduledPost(CreateScheduledPostReq) returns (CreateScheduledPostResp);
}

// ──────────── 粉丝增长 ────────────

message GetNoteFansGrowthReq {
  int64 note_id = 1;
}

message FansGrowthPoint {
  string hour = 1;
  int64  count = 2;
}

message GetNoteFansGrowthResp {
  repeated FansGrowthPoint points = 1;
}

// ──────────── 标签分析 ────────────

message GetTagAnalyticsReq {
  string tag = 1;
}

message GetTagAnalyticsResp {
  string tag             = 1;
  int64  note_count      = 2;
  int64  total_likes     = 3;
  int64  total_collects  = 4;
  int64  total_comments  = 5;
  double engagement_rate = 6;
}

message GetTopTagsReq {
  int32 limit = 1;
}

message TagSummary {
  string tag             = 1;
  int64  note_count      = 2;
  double engagement_rate = 3;
}

message GetTopTagsResp {
  repeated TagSummary tags = 1;
}

// ──────────── 运营建议 ────────────

message GetSuggestionsReq {
  int64 user_id = 1;
}

message GetSuggestionsResp {
  repeated string suggestions = 1;
}

// ──────────── 定时发布 ────────────

message CreateScheduledPostReq {
  int64  user_id      = 1;
  string title        = 2;
  string content      = 3;
  repeated string image_urls = 4;
  repeated string tags       = 5;
  int64  schedule_time = 6;  // 定时发布时间（Unix 时间戳）
}

message CreateScheduledPostResp {
  int64 task_id = 1;
  string status = 2;  // "scheduled"
}
